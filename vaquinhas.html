<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interas Comunidade</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configuração de Cores Customizadas no Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { DEFAULT: '#1B4332', hover: '#102a1f', light: 'rgba(27, 67, 50, 0.1)' },
                        accent: { DEFAULT: '#C48B00', hover: '#a17200', light: 'rgba(196, 139, 0, 0.1)' }
                    }
                }
            }
        }
    </script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Estilos adicionais para transições suaves */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #1B4332; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #102a1f; }
    </style>
</head>
<body class="min-h-screen bg-slate-50 font-sans text-slate-900 selection:bg-accent selection:text-primary">

    <!-- Header -->
    <header class="bg-primary text-white shadow-xl sticky top-0 z-40 border-b-4 border-accent">
        <div class="max-w-7xl mx-auto px-4 md:px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4 cursor-pointer group" onclick="switchView('list')">
                <div class="bg-accent p-2 rounded-xl text-primary group-hover:bg-white transition-colors shadow-inner">
                    <i data-lucide="piggy-bank" class="w-7 h-7 stroke-[2.5px]"></i>
                </div>
                <div class="flex flex-col">
                    <h1 class="text-2xl font-black tracking-widest uppercase leading-none">Interas <span class="text-accent"></span></h1>
                    <span class="text-[10px] text-white/70 tracking-[0.2em] font-bold uppercase mt-1">Comunidade</span>
                </div>
            </div>
            
            <nav class="hidden md:flex gap-8 text-sm font-bold text-white/80 uppercase tracking-wider">
                <button onclick="switchView('list')" id="nav-btn-list" class="hover:text-accent transition-colors py-7 border-b-4 border-transparent">
                    Início
                </button>
                <button onclick="requireAuth('create')" id="nav-btn-form" class="hover:text-accent transition-colors py-7 flex items-center gap-2 border-b-4 border-transparent">
                    <i data-lucide="plus-circle" class="w-4 h-4"></i> Nova Arrecadação
                </button>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 md:px-6 py-10 relative">
        
        <!-- ================= VIEW: LIST ================= -->
        <div id="view-list" class="space-y-6 fade-in hidden">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                <h2 class="text-2xl font-black text-primary">Interas Ativas</h2>
                <button onclick="requireAuth('create')" class="flex items-center gap-2 bg-primary hover:bg-primary-hover text-white px-5 py-2.5 rounded-lg font-medium transition-colors w-full sm:w-auto justify-center shadow-md">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i>
                    <span>Nova Intera</span>
                </button>
            </div>
            <div id="campaigns-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Cards renderizados via JS -->
            </div>
        </div>

        <!-- ================= VIEW: FORM (CREATE/EDIT) ================= -->
        <div id="view-form" class="max-w-3xl mx-auto bg-white p-6 md:p-8 rounded-xl shadow-md border-t-8 border-t-primary fade-in hidden">
            <button onclick="switchView(editMode ? 'detail' : 'list')" class="flex items-center gap-2 text-slate-500 hover:text-primary font-medium mb-6 transition-colors">
                <i data-lucide="arrow-left" class="w-5 h-5"></i> Voltar
            </button>
            
            <h2 id="form-title" class="text-2xl font-black text-primary mb-6 border-b border-slate-100 pb-4">
                Cadastrar Nova Intera
            </h2>
            
            <form id="campaign-form" onsubmit="handleFormSubmit(event)" class="space-y-6">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">Título da Intera</label>
                        <input required id="input-title" type="text" placeholder="Ex: Piquenique, Reforma, Congresso..." class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-primary outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">Descrição</label>
                        <textarea required id="input-desc" rows="3" placeholder="Explique o motivo, data, local ou mais detalhes..." class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-primary outline-none transition-all"></textarea>
                    </div>
                </div>

                <div class="bg-slate-50 p-5 rounded-xl border border-slate-200 space-y-5">
                    <h3 class="font-black text-primary flex items-center gap-2"><i data-lucide="target" class="w-4 h-4"></i> Formato da Arrecadação</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <label id="lbl-type-finance" class="cursor-pointer border-2 p-4 rounded-xl flex items-start gap-3 transition-all">
                            <input type="radio" name="type" value="finance" class="mt-1 accent-primary" onchange="toggleFormSections()">
                            <div>
                                <div class="font-bold text-primary flex items-center gap-2"><i data-lucide="wallet" class="w-4 h-4"></i> Valores (R$)</div>
                                <div class="text-xs text-slate-500 mt-1">Arrecadação de dinheiro com meta definida.</div>
                            </div>
                        </label>

                        <label id="lbl-type-item" class="cursor-pointer border-2 p-4 rounded-xl flex items-start gap-3 transition-all">
                            <input type="radio" name="type" value="item" class="mt-1 accent-accent" onchange="toggleFormSections()">
                            <div>
                                <div class="font-bold text-[#916700] flex items-center gap-2"><i data-lucide="coffee" class="w-4 h-4"></i> Itens / Comida</div>
                                <div class="text-xs text-slate-500 mt-1">Ex: Junta-panelas, doação de alimentos, etc.</div>
                            </div>
                        </label>
                    </div>

                    <div class="pt-2">
                        <label class="block text-sm font-bold text-slate-700 mb-2">Modo de Oferta</label>
                        <select id="input-mode" onchange="toggleFormSections()" class="w-full px-4 py-3 border border-slate-200 rounded-lg outline-none bg-white focus:ring-2 focus:ring-primary"></select>
                    </div>
                </div>
                
                <!-- Secão Financeira -->
                <div id="section-finance" class="space-y-4 border-l-4 border-primary pl-4 hidden">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-1">Meta Total (R$)</label>
                            <input id="input-goal" type="number" min="1" step="0.01" placeholder="Ex: 1000.00" class="w-full px-4 py-3 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-primary">
                        </div>
                        <div id="wrap-quota-value" class="hidden">
                            <label class="block text-sm font-bold text-slate-700 mb-1">Valor da Cota (R$)</label>
                            <input id="input-quota" type="number" min="1" step="0.01" placeholder="Ex: 50.00" class="w-full px-4 py-3 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-primary">
                        </div>
                    </div>
                    
                    <div class="bg-primary-light/50 p-5 rounded-lg border border-primary/10">
                        <h4 class="font-bold text-primary flex items-center gap-2 mb-4"><i data-lucide="qr-code" class="w-4 h-4"></i> Dados para Recebimento (PIX)</h4>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-600 mb-1">Chave PIX</label>
                                <input id="input-pixkey" type="text" placeholder="Sua chave Pix" class="w-full px-3 py-2 text-sm border border-slate-300 rounded outline-none focus:border-primary">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-600 mb-1">Nome do Titular/Instituição</label>
                                <input id="input-pixname" type="text" placeholder="Nome que vai aparecer" class="w-full px-3 py-2 text-sm border border-slate-300 rounded outline-none focus:border-primary">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Secão Itens (Lista Fixa) -->
                <div id="section-items" class="space-y-4 border-l-4 border-accent pl-4 hidden">
                    <label class="block text-sm font-bold text-slate-700">Montar Lista de Itens Necessários</label>
                    <div class="flex gap-2 items-start">
                        <input id="new-item-name" type="text" placeholder="Ex: Fardo de Refrigerante" class="flex-grow px-3 py-2 border border-slate-300 rounded-lg outline-none focus:border-accent">
                        <input id="new-item-qty" type="number" min="1" placeholder="Qtd" class="w-20 px-3 py-2 border border-slate-300 rounded-lg outline-none focus:border-accent">
                        <button type="button" onclick="addFormItem()" class="bg-primary hover:bg-primary-hover text-white px-4 py-2 rounded-lg font-bold">Adicionar</button>
                    </div>
                    <ul id="form-items-list" class="mt-3 divide-y divide-slate-100 border border-slate-200 rounded-lg p-2 bg-white hidden">
                        <!-- Itens adicionados aqui -->
                    </ul>
                </div>

                <div class="pt-6">
                    <button type="submit" id="btn-form-submit" class="w-full bg-primary hover:bg-primary-hover text-white font-black py-4 px-4 rounded-xl transition-all shadow-lg hover:shadow-xl text-lg uppercase tracking-wide">
                        Publicar Intera
                    </button>
                </div>
            </form>
        </div>

        <!-- ================= VIEW: DETAIL ================= -->
        <div id="view-detail" class="max-w-5xl mx-auto fade-in hidden">
            <!-- Top Bar -->
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                <button onclick="switchView('list')" class="flex items-center gap-2 text-slate-500 hover:text-primary font-bold transition-colors">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i> Voltar
                </button>
                <div class="flex gap-2 w-full sm:w-auto">
                    <button onclick="requireAuth('delete')" class="flex-1 sm:flex-none flex items-center justify-center gap-2 text-red-600 bg-red-50 hover:bg-red-100 px-4 py-2 rounded-lg font-bold transition-colors">
                        <i data-lucide="trash-2" class="w-4 h-4"></i> <span class="hidden sm:inline">Excluir</span>
                    </button>
                    <button onclick="requireAuth('edit')" class="flex-1 sm:flex-none flex items-center justify-center gap-2 text-primary bg-primary-light hover:bg-primary/20 px-4 py-2 rounded-lg font-bold transition-colors">
                        <i data-lucide="edit" class="w-4 h-4"></i> <span class="hidden sm:inline">Editar</span>
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Coluna Esquerda: Detalhes -->
                <div class="lg:col-span-2 space-y-6">
                    
                    <!-- Cabeçalho da Intera -->
                    <div class="bg-white p-6 md:p-8 rounded-2xl shadow-md border-t-8 border-primary">
                        <div id="detail-tags" class="flex flex-wrap items-center gap-2 mb-4"></div>
                        <h1 id="detail-title" class="text-3xl md:text-4xl font-black text-primary mb-4 leading-tight"></h1>
                        <p id="detail-desc" class="text-slate-600 text-lg mb-8 leading-relaxed whitespace-pre-wrap"></p>
                        
                        <!-- Progresso Financeiro (Injetado via JS) -->
                        <div id="detail-finance-progress"></div>

                        <!-- Lista de Itens Necessários (Injetado via JS) -->
                        <div id="detail-items-needed"></div>
                    </div>

                    <!-- Bloco PIX (Injetado via JS) -->
                    <div id="detail-pix-block"></div>

                    <!-- Lista de Participantes -->
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <h3 class="text-xl font-black text-primary mb-6 flex items-center gap-2 pb-4 border-b border-slate-100">
                            <i data-lucide="users" class="w-5 h-5 text-accent"></i> Quem já está participando
                        </h3>
                        <div id="detail-contributors-list"></div>
                    </div>
                </div>

                <!-- Coluna Direita: Formulário de Contribuição -->
                <div class="lg:col-span-1">
                    <div class="bg-primary p-6 md:p-8 rounded-2xl shadow-xl text-white sticky top-24 border-t-4 border-accent">
                        <h3 class="text-2xl font-black mb-2 flex items-center gap-2">
                            Fazer Parte <i data-lucide="flame" class="w-5 h-5 text-accent"></i>
                        </h3>
                        <p id="contrib-subtitle" class="text-accent mb-8 text-sm font-medium"></p>
                        
                        <div id="contrib-init">
                            <button onclick="toggleContribForm(true)" class="w-full bg-accent hover:bg-accent-hover text-primary font-black py-4 px-4 rounded-xl transition-all shadow-lg hover:shadow-xl text-lg uppercase tracking-wide">
                                Registrar minha Oferta
                            </button>
                        </div>

                        <form id="contrib-form" onsubmit="submitContribution(event)" class="space-y-5 bg-white/5 p-5 rounded-xl border border-white/10 backdrop-blur-sm hidden fade-in">
                            <div>
                                <label class="block text-sm font-bold text-white mb-1.5">Seu Nome (ou Família)</label>
                                <input required id="contrib-name" type="text" placeholder="Ex: Família Silva" class="w-full px-4 py-3 bg-white text-primary font-bold rounded-lg outline-none focus:ring-4 focus:ring-accent/50">
                            </div>

                            <!-- Campos dinâmicos injetados via JS -->
                            <div id="contrib-dynamic-fields"></div>

                            <div class="pt-5 flex flex-col gap-3">
                                <button type="submit" class="w-full bg-accent hover:bg-accent-hover text-primary font-black py-3.5 px-4 rounded-xl transition-all shadow-md text-lg uppercase tracking-wide">
                                    Confirmar
                                </button>
                                <button type="button" onclick="toggleContribForm(false)" class="w-full text-white/70 hover:text-white font-bold py-2 transition-colors text-sm uppercase tracking-wide">
                                    Cancelar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal de Autenticação -->
    <div id="auth-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full overflow-hidden fade-in">
            <div id="auth-header" class="bg-primary p-4 flex justify-between items-center text-white transition-colors">
                <h3 class="font-black flex items-center gap-2"><i data-lucide="lock" class="w-4 h-4"></i> Acesso Restrito</h3>
                <button onclick="closeAuthModal()" class="text-white/70 hover:text-white transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <form onsubmit="handleAuthSubmit(event)" class="p-6">
                <p id="auth-message" class="text-slate-600 text-sm mb-4"></p>
                <div class="mb-4">
                    <input type="password" id="auth-password" placeholder="Senha" class="w-full px-4 py-3 bg-slate-50 border border-slate-300 rounded-lg outline-none focus:ring-2 transition-all font-mono">
                    <p id="auth-error" class="text-red-500 text-xs mt-2 font-bold hidden">Senha incorreta. Tente "123".</p>
                </div>
                <button type="submit" id="auth-submit-btn" class="w-full bg-accent hover:bg-accent-hover text-primary font-black py-3 rounded-lg transition-colors uppercase tracking-wide">
                    Acessar
                </button>
            </form>
        </div>
    </div>

    <!-- Script da Aplicação -->
    <script>
        // --- ESTADO INICIAL ---
        let campaigns = [
            { id: 1, type: 'finance', mode: 'open', title: 'Reforma do Telhado do Salão Social', description: 'Precisamos arrecadar fundos para consertar as calhas e telhas antes do período de chuvas.', goal: 5000, raised: 1500, pixKey: '12.345.678/0001-90', pixName: 'Igreja Presbiteriana Local', contributors: [{ id: 101, name: 'Família Silva', amount: 500 }, { id: 102, name: 'João Pedro', amount: 1000 }] },
            { id: 2, type: 'item', mode: 'fixed', title: 'Piquenique da Escola Dominical', description: 'Nosso tradicional piquenique no parque. Escolha o que você pode levar para abençoar os irmãos!', itemsNeeded: [{ id: 'i1', name: 'Refrigerante 2L', needed: 10, pledged: 4 }, { id: 'i2', name: 'Bolo Caseiro', needed: 5, pledged: 5 }, { id: 'i3', name: 'Salgadinhos (cento)', needed: 10, pledged: 2 }], contributors: [{ id: 103, name: 'Irmã Maria', itemName: 'Bolo Caseiro', quantity: 2 }, { id: 104, name: 'Família Souza', itemName: 'Refrigerante 2L', quantity: 4 }, { id: 105, name: 'Tia Ana', itemName: 'Bolo Caseiro', quantity: 3 }, { id: 106, name: 'Jovens', itemName: 'Salgadinhos (cento)', quantity: 2 }] },
            { id: 3, type: 'item', mode: 'open', title: 'Junta-Panelas dos Jovens (UMP)', description: 'Confraternização da UMP sábado à noite. Traga o que quiser compartilhar!', contributors: [{ id: 107, name: 'Lucas', itemName: '2 Pizzas', quantity: 1 }, { id: 108, name: 'Sara', itemName: 'Torta de Frango', quantity: 1 }] }
        ];

        let currentView = 'list';
        let editMode = false;
        let selectedCampaign = null;
        let pendingAction = null;
        let formItemsNeeded = [];

        // Inicializa ícones na carga da página
        lucide.createIcons();

        // --- FUNÇÕES UTILITÁRIAS ---
        const formatCurrency = (value) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value || 0);

        const copyPix = (text) => {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try { document.execCommand('copy'); } catch (err) { console.error('Erro ao copiar', err); }
            document.body.removeChild(textArea);
            
            const btn = document.getElementById('btn-copy-pix');
            if(btn) {
                btn.innerHTML = `<i data-lucide="check" class="w-4 h-4"></i> Copiado`;
                btn.classList.replace('bg-accent', 'bg-emerald-500');
                btn.classList.replace('text-primary', 'text-white');
                lucide.createIcons();
                setTimeout(() => {
                    btn.innerHTML = `<i data-lucide="copy" class="w-4 h-4"></i> Copiar`;
                    btn.classList.replace('bg-emerald-500', 'bg-accent');
                    btn.classList.replace('text-white', 'text-primary');
                    lucide.createIcons();
                }, 2000);
            }
        };

        // --- CONTROLE DE NAVEGAÇÃO ---
        function switchView(viewName) {
            document.getElementById('view-list').classList.add('hidden');
            document.getElementById('view-form').classList.add('hidden');
            document.getElementById('view-detail').classList.add('hidden');
            
            document.getElementById('nav-btn-list').classList.replace('border-accent', 'border-transparent');
            document.getElementById('nav-btn-list').classList.remove('text-white');
            document.getElementById('nav-btn-form').classList.replace('border-accent', 'border-transparent');
            document.getElementById('nav-btn-form').classList.remove('text-white');

            currentView = viewName;

            if (viewName === 'list') {
                document.getElementById('view-list').classList.remove('hidden');
                document.getElementById('nav-btn-list').classList.replace('border-transparent', 'border-accent');
                document.getElementById('nav-btn-list').classList.add('text-white');
                renderList();
            } else if (viewName === 'form') {
                document.getElementById('view-form').classList.remove('hidden');
                document.getElementById('nav-btn-form').classList.replace('border-transparent', 'border-accent');
                document.getElementById('nav-btn-form').classList.add('text-white');
                renderForm();
            } else if (viewName === 'detail') {
                document.getElementById('view-detail').classList.remove('hidden');
                renderDetail();
            }
            lucide.createIcons();
        }

        // --- AUTENTICAÇÃO ---
        function requireAuth(action) {
            pendingAction = action;
            const modal = document.getElementById('auth-modal');
            const header = document.getElementById('auth-header');
            const message = document.getElementById('auth-message');
            const btn = document.getElementById('auth-submit-btn');
            const input = document.getElementById('auth-password');
            const err = document.getElementById('auth-error');

            input.value = '';
            err.classList.add('hidden');
            input.classList.remove('border-red-500', 'focus:ring-red-500');

            if (action === 'delete') {
                header.className = 'bg-red-600 p-4 flex justify-between items-center text-white transition-colors';
                message.innerHTML = '<span class="text-red-600 font-bold">Atenção: Insira a senha de administrador para EXCLUIR definitivamente esta intera.</span>';
                btn.className = 'w-full bg-red-600 hover:bg-red-700 text-white font-black py-3 rounded-lg transition-colors uppercase tracking-wide';
                btn.innerText = 'Confirmar Exclusão';
            } else {
                header.className = 'bg-primary p-4 flex justify-between items-center text-white transition-colors';
                message.innerText = `Por favor, insira a senha de administrador para ${action === 'create' ? 'criar uma nova intera' : 'editar esta intera'}.`;
                btn.className = 'w-full bg-accent hover:bg-accent-hover text-primary font-black py-3 rounded-lg transition-colors uppercase tracking-wide';
                btn.innerText = 'Acessar';
            }

            modal.classList.remove('hidden');
            setTimeout(() => input.focus(), 100);
        }

        function closeAuthModal() {
            document.getElementById('auth-modal').classList.add('hidden');
        }

        function handleAuthSubmit(e) {
            e.preventDefault();
            const pass = document.getElementById('auth-password').value;
            const err = document.getElementById('auth-error');
            const input = document.getElementById('auth-password');

            if (pass === '123') {
                closeAuthModal();
                if (pendingAction === 'create') { setEditMode(false); selectedCampaign = null; switchView('form'); }
                else if (pendingAction === 'edit') { setEditMode(true); switchView('form'); }
                else if (pendingAction === 'delete') { deleteCampaign(); }
            } else {
                err.classList.remove('hidden');
                input.classList.add('border-red-500', 'focus:ring-red-500');
            }
        }

        // --- RENDERIZAÇÃO: LISTA ---
        function renderList() {
            const grid = document.getElementById('campaigns-grid');
            grid.innerHTML = '';

            campaigns.forEach(camp => {
                const isFinance = camp.type === 'finance';
                const progress = isFinance ? Math.min((camp.raised / camp.goal) * 100, 100) : 0;
                
                const card = document.createElement('div');
                card.className = "bg-white border-t-4 border-t-[#C48B00] rounded-b-xl rounded-t-sm shadow-sm hover:shadow-lg transition-all cursor-pointer overflow-hidden flex flex-col group relative";
                card.onclick = () => { selectedCampaign = camp; switchView('detail'); };

                card.innerHTML = `
                    <div class="absolute top-4 right-4 transition-colors opacity-20 group-hover:opacity-100 text-[#1B4332]">
                        <i data-lucide="${isFinance ? 'wallet' : 'coffee'}" class="w-7 h-7"></i>
                    </div>
                    <div class="p-6 flex-grow flex flex-col">
                        <div class="mb-3 pr-8">
                            <h3 class="text-lg font-bold text-[#1B4332] leading-tight mb-2">${camp.title}</h3>
                            <span class="inline-flex items-center gap-1.5 text-xs font-bold px-2.5 py-1 rounded-md ${isFinance ? 'bg-[#1B4332]/10 text-[#1B4332]' : 'bg-[#C48B00]/20 text-[#916700]'}">
                                ${isFinance ? 'Financeira' : 'Itens / Comida'}
                            </span>
                        </div>
                        <p class="text-slate-600 text-sm mb-6 line-clamp-2 flex-grow">${camp.description}</p>
                        <div class="space-y-3 mt-auto border-t border-slate-100 pt-4">
                            ${isFinance ? `
                                <div class="flex justify-between text-sm font-medium mb-1">
                                    <span class="font-black text-[#1B4332]">${formatCurrency(camp.raised)}</span>
                                    <span class="text-slate-500">Meta: ${formatCurrency(camp.goal)}</span>
                                </div>
                                <div class="w-full bg-slate-100 rounded-full h-2">
                                    <div class="h-2 rounded-full ${progress >= 100 ? 'bg-emerald-500' : 'bg-[#1B4332]'}" style="width: ${progress}%"></div>
                                </div>
                            ` : `
                                <div class="flex items-center gap-2 text-sm text-slate-600">
                                    <i data-lucide="gift" class="w-4 h-4 text-[#C48B00]"></i>
                                    <span>${camp.contributors.length > 0 ? `<strong>${camp.contributors.length}</strong> pessoas ofertaram` : 'Seja o primeiro a ofertar!'}</span>
                                </div>
                            `}
                            <div class="flex items-center gap-4 text-xs text-slate-500 font-medium">
                                <span class="flex items-center gap-1.5">
                                    <i data-lucide="list-checks" class="w-3.5 h-3.5 text-[#1B4332]"></i>
                                    ${camp.mode === 'fixed' ? (isFinance ? 'Cotas Fixas' : 'Lista Pré-definida') : 'Oferta Livre'}
                                </span>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // --- RENDERIZAÇÃO E LÓGICA: FORMULÁRIO ---
        function renderForm() {
            document.getElementById('form-title').innerText = editMode ? 'Editar Intera' : 'Cadastrar Nova Intera';
            document.getElementById('btn-form-submit').innerText = editMode ? 'Salvar Alterações' : 'Publicar Intera';

            const data = editMode && selectedCampaign ? selectedCampaign : { type: 'finance', mode: 'open', itemsNeeded: [] };
            formItemsNeeded = data.itemsNeeded ? [...data.itemsNeeded] : [];

            document.getElementById('input-title').value = data.title || '';
            document.getElementById('input-desc').value = data.description || '';
            document.querySelector(`input[name="type"][value="${data.type}"]`).checked = true;
            
            toggleFormSections(); // Configura as options do select de Mode e visual
            document.getElementById('input-mode').value = data.mode;
            toggleFormSections(); // Executa novamente para mostrar/esconder sections

            document.getElementById('input-goal').value = data.goal || '';
            document.getElementById('input-quota').value = data.quotaValue || '';
            document.getElementById('input-pixkey').value = data.pixKey || '';
            document.getElementById('input-pixname').value = data.pixName || '';
            
            renderFormItemsList();
        }

        function toggleFormSections() {
            const type = document.querySelector('input[name="type"]:checked').value;
            const modeSelect = document.getElementById('input-mode');
            const currentMode = modeSelect.value;
            
            // Atualiza select de modo
            modeSelect.innerHTML = type === 'finance' 
                ? `<option value="open">Valor Livre (Cada um dá o que puder)</option><option value="fixed">Cotas Fixas (Ex: 100 cotas de R$ 50)</option>`
                : `<option value="open">Oferta Livre (Pessoa escreve o que vai levar)</option><option value="fixed">Lista Pré-definida (Você define o que precisa e quantidades)</option>`;
            
            // Tenta manter o mode selecionado se existir, senao default
            if(modeSelect.querySelector(`option[value="${currentMode}"]`)) modeSelect.value = currentMode;

            const mode = modeSelect.value;

            // Estilos dos botões de rádio
            const lblFinance = document.getElementById('lbl-type-finance');
            const lblItem = document.getElementById('lbl-type-item');
            if (type === 'finance') {
                lblFinance.className = 'cursor-pointer border-2 p-4 rounded-xl flex items-start gap-3 transition-all border-primary bg-primary/5';
                lblItem.className = 'cursor-pointer border-2 p-4 rounded-xl flex items-start gap-3 transition-all border-slate-200 bg-white hover:border-accent/50';
            } else {
                lblFinance.className = 'cursor-pointer border-2 p-4 rounded-xl flex items-start gap-3 transition-all border-slate-200 bg-white hover:border-primary/30';
                lblItem.className = 'cursor-pointer border-2 p-4 rounded-xl flex items-start gap-3 transition-all border-accent bg-accent/10';
            }

            // Exibe seções de configuração
            document.getElementById('section-finance').classList.toggle('hidden', type !== 'finance');
            document.getElementById('wrap-quota-value').classList.toggle('hidden', !(type === 'finance' && mode === 'fixed'));
            document.getElementById('section-items').classList.toggle('hidden', !(type === 'item' && mode === 'fixed'));
            
            // Requerimentos dinamicos
            document.getElementById('input-goal').required = (type === 'finance');
            document.getElementById('input-pixkey').required = (type === 'finance');
            document.getElementById('input-pixname').required = (type === 'finance');
            document.getElementById('input-quota').required = (type === 'finance' && mode === 'fixed');
        }

        function addFormItem() {
            const name = document.getElementById('new-item-name').value;
            const qty = parseInt(document.getElementById('new-item-qty').value);
            if (name && qty) {
                formItemsNeeded.push({ id: Date.now().toString(), name, needed: qty, pledged: 0 });
                document.getElementById('new-item-name').value = '';
                document.getElementById('new-item-qty').value = '';
                renderFormItemsList();
            }
        }

        function removeFormItem(id) {
            formItemsNeeded = formItemsNeeded.filter(i => i.id !== id);
            renderFormItemsList();
        }

        function renderFormItemsList() {
            const list = document.getElementById('form-items-list');
            list.innerHTML = '';
            if (formItemsNeeded.length > 0) {
                list.classList.remove('hidden');
                formItemsNeeded.forEach(item => {
                    const li = document.createElement('li');
                    li.className = "py-2 px-2 flex justify-between items-center text-sm";
                    li.innerHTML = `
                        <span class="font-bold text-slate-700">${item.name}</span>
                        <div class="flex items-center gap-4">
                            <span class="bg-slate-100 px-2 py-1 rounded text-slate-600 font-medium">Qtd: ${item.needed}</span>
                            <button type="button" onclick="removeFormItem('${item.id}')" class="text-red-500 text-xs hover:underline font-bold">Remover</button>
                        </div>
                    `;
                    list.appendChild(li);
                });
            } else {
                list.classList.add('hidden');
            }
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            const type = document.querySelector('input[name="type"]:checked').value;
            const mode = document.getElementById('input-mode').value;
            
            const payload = {
                title: document.getElementById('input-title').value,
                description: document.getElementById('input-desc').value,
                type, mode
            };

            if (type === 'finance') {
                payload.goal = parseFloat(document.getElementById('input-goal').value);
                payload.pixKey = document.getElementById('input-pixkey').value;
                payload.pixName = document.getElementById('input-pixname').value;
                if (mode === 'fixed') payload.quotaValue = parseFloat(document.getElementById('input-quota').value);
            } else if (type === 'item' && mode === 'fixed') {
                payload.itemsNeeded = formItemsNeeded;
            }

            if (editMode) {
                handleUpdateCampaign(selectedCampaign.id, payload);
            } else {
                handleCreateCampaign(payload);
            }
        }

        function deleteCampaign() {
            handleDeleteCampaign(selectedCampaign.id);
        }

        // --- RENDERIZAÇÃO E LÓGICA: DETALHES E CONTRIBUIÇÃO ---
        function renderDetail() {
            const camp = selectedCampaign;
            const isFinance = camp.type === 'finance';
            
            // Top Tags
            document.getElementById('detail-tags').innerHTML = `
                <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md text-xs font-black uppercase tracking-wider ${isFinance ? 'bg-primary text-white' : 'bg-accent text-primary'}">
                    <i data-lucide="${isFinance ? 'wallet' : 'coffee'}" class="w-3.5 h-3.5"></i> ${isFinance ? 'Financeira' : 'Itens/Comida'}
                </span>
                <span class="bg-slate-100 text-slate-600 px-3 py-1.5 rounded-md text-xs font-bold uppercase tracking-wider border border-slate-200">
                    ${camp.mode === 'fixed' ? 'Modelo Fechado' : 'Oferta Livre'}
                </span>
            `;

            document.getElementById('detail-title').innerText = camp.title;
            document.getElementById('detail-desc').innerText = camp.description;

            // Finance Progress Block
            const financeBlock = document.getElementById('detail-finance-progress');
            financeBlock.innerHTML = '';
            if (isFinance) {
                const progress = Math.min((camp.raised / camp.goal) * 100, 100);
                financeBlock.innerHTML = `
                    <div class="bg-primary-light p-6 rounded-xl border border-primary/10 mb-6">
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-4 gap-4">
                            <div>
                                <span class="text-4xl md:text-5xl font-black text-primary block mb-1">${formatCurrency(camp.raised)}</span>
                                <span class="text-primary/70 font-bold uppercase tracking-wider text-sm">Arrecadados</span>
                            </div>
                            <div class="sm:text-right bg-white px-4 py-2 rounded-lg border border-primary/10 shadow-sm w-full sm:w-auto">
                                <span class="text-xs text-slate-500 font-bold uppercase tracking-wider block">Meta Final</span>
                                <span class="font-black text-slate-800 text-xl">${formatCurrency(camp.goal)}</span>
                            </div>
                        </div>
                        <div class="w-full bg-slate-200 rounded-full h-4 mb-2 overflow-hidden shadow-inner">
                            <div class="h-full transition-all duration-1000 ease-out ${progress >= 100 ? 'bg-emerald-500' : 'bg-primary'}" style="width: ${progress}%"></div>
                        </div>
                        <div class="text-right text-sm font-bold text-primary">${progress.toFixed(1)}% alcançado</div>
                    </div>
                `;
            }

            // Items List Block
            const itemsBlock = document.getElementById('detail-items-needed');
            itemsBlock.innerHTML = '';
            if (!isFinance && camp.mode === 'fixed') {
                let itemsHtml = camp.itemsNeeded.map(item => {
                    const completed = item.pledged >= item.needed;
                    return `
                        <div class="p-4 rounded-xl border-2 ${completed ? 'bg-emerald-50 border-emerald-200' : 'bg-white border-white'} shadow-sm flex justify-between items-center">
                            <div>
                                <span class="block font-bold ${completed ? 'text-emerald-900 line-through opacity-70' : 'text-slate-800'}">${item.name}</span>
                                <span class="text-xs font-medium text-slate-500">Temos ${item.pledged} de ${item.needed}</span>
                            </div>
                            ${completed ? '<i data-lucide="check-circle-2" class="text-emerald-500 w-6 h-6"></i>' : `<div class="text-sm font-black text-primary bg-primary/10 px-2 py-1 rounded">Faltam ${item.needed - item.pledged}</div>`}
                        </div>
                    `;
                }).join('');
                
                itemsBlock.innerHTML = `
                    <div class="mb-6 bg-accent-light p-6 rounded-xl border border-accent/30">
                        <h3 class="text-lg font-black text-primary mb-4 flex items-center gap-2">
                            <i data-lucide="list-checks" class="text-accent w-5 h-5"></i> O que precisamos:
                        </h3>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">${itemsHtml}</div>
                    </div>
                `;
            }

            // PIX Block
            const pixBlock = document.getElementById('detail-pix-block');
            pixBlock.innerHTML = '';
            if (isFinance) {
                pixBlock.innerHTML = `
                    <div class="bg-white p-6 rounded-2xl border-2 border-accent shadow-md flex flex-col sm:flex-row items-center gap-6 relative overflow-hidden mb-6">
                        <div class="absolute top-0 right-0 w-32 h-32 bg-accent opacity-10 rounded-bl-full -z-10"></div>
                        <div class="p-4 rounded-xl bg-primary text-white shadow-lg flex-shrink-0">
                            <i data-lucide="qr-code" class="w-12 h-12"></i>
                        </div>
                        <div class="flex-grow text-center sm:text-left z-10">
                            <h4 class="text-xl font-black text-primary mb-1">Chave PIX para Ofertas</h4>
                            <p class="text-slate-600 text-sm mb-4 font-medium">Favorecido: <strong class="text-slate-800">${camp.pixName}</strong></p>
                            <div class="flex items-center max-w-md bg-slate-50 border-2 border-slate-200 rounded-xl overflow-hidden shadow-sm mx-auto sm:mx-0 focus-within:border-primary transition-colors">
                                <div class="px-4 py-3 text-slate-800 font-mono text-sm font-bold flex-grow truncate">${camp.pixKey}</div>
                                <button id="btn-copy-pix" onclick="copyPix('${camp.pixKey}')" class="px-5 py-3 font-bold text-sm transition-colors flex items-center gap-2 bg-accent text-primary hover:bg-accent-hover">
                                    <i data-lucide="copy" class="w-4 h-4"></i> Copiar
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }

            // Contributors List
            const listBlock = document.getElementById('detail-contributors-list');
            if (camp.contributors.length === 0) {
                listBlock.innerHTML = `
                    <div class="text-center py-10 text-slate-400">
                        <i data-lucide="message-square" class="w-10 h-10 mx-auto mb-3 opacity-30"></i>
                        <p class="font-medium">Ainda não há ofertas registradas. Seja o primeiro!</p>
                    </div>
                `;
            } else {
                let html = '<ul class="space-y-3">';
                camp.contributors.forEach(c => {
                    const letter = c.name.charAt(0).toUpperCase();
                    const valBadge = isFinance 
                        ? `<span class="font-black text-lg text-primary bg-primary/10 px-4 py-1.5 rounded-lg border border-primary/20">${formatCurrency(c.amount)}</span>`
                        : `<span class="font-bold text-[#916700] bg-accent/20 px-4 py-1.5 rounded-lg border border-accent/30">${c.quantity}x ${c.itemName}</span>`;
                    html += `
                        <li class="p-4 bg-slate-50 rounded-xl flex flex-col sm:flex-row sm:items-center justify-between gap-3 border border-slate-100 hover:border-primary/30 transition-colors">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 rounded-full flex items-center justify-center font-black text-lg bg-primary text-white shadow-md">${letter}</div>
                                <span class="font-bold text-lg text-primary">${c.name}</span>
                            </div>
                            <div class="text-right">${valBadge}</div>
                        </li>
                    `;
                });
                html += '</ul>';
                listBlock.innerHTML = html;
            }

            // Config Formulario Lateral
            document.getElementById('contrib-subtitle').innerText = isFinance ? "Registre aqui sua oferta após fazer o PIX." : "Assuma um item da lista e contribua!";
            toggleContribForm(false);
            
            const dynFields = document.getElementById('contrib-dynamic-fields');
            dynFields.innerHTML = '';
            
            if (isFinance && camp.mode === 'open') {
                dynFields.innerHTML = `
                    <div>
                        <label class="block text-sm font-bold text-white mb-1.5">Valor Ofertado (R$)</label>
                        <input required id="c-amount" type="number" min="1" step="0.01" placeholder="0.00" class="w-full px-4 py-3 bg-white text-primary font-bold rounded-lg outline-none focus:ring-4 focus:ring-accent/50">
                    </div>`;
            } else if (isFinance && camp.mode === 'fixed') {
                dynFields.innerHTML = `
                    <div>
                        <label class="block text-sm font-bold text-white mb-1.5">Quantas cotas?</label>
                        <div class="flex items-center gap-3 bg-white p-2.5 rounded-lg border-2 border-transparent focus-within:border-accent">
                            <input required id="c-quota-qty" type="number" min="1" value="1" oninput="updateQuotaTotal(${camp.quotaValue})" class="w-20 px-3 py-2 text-primary bg-slate-100 rounded-md outline-none text-center font-black text-lg">
                            <span class="text-sm font-bold text-slate-500 leading-tight">
                                x ${formatCurrency(camp.quotaValue)} = <br>
                                <strong id="c-quota-total" class="text-primary text-xl">${formatCurrency(camp.quotaValue)}</strong>
                            </span>
                        </div>
                    </div>`;
            } else if (!isFinance && camp.mode === 'open') {
                dynFields.innerHTML = `
                    <div>
                        <label class="block text-sm font-bold text-white mb-1.5">O que você vai levar?</label>
                        <input required id="c-item-name" type="text" placeholder="Ex: 2 Refrigerantes Guaraná" class="w-full px-4 py-3 bg-white text-primary font-bold rounded-lg outline-none focus:ring-4 focus:ring-accent/50">
                    </div>`;
            } else if (!isFinance && camp.mode === 'fixed') {
                let options = camp.itemsNeeded.map(i => {
                    const faltam = i.needed - i.pledged;
                    return `<option value="${i.name}" ${faltam <= 0 ? 'disabled' : ''}>${i.name} ${faltam <= 0 ? '(Completo)' : `(Faltam ${faltam})`}</option>`;
                }).join('');
                dynFields.innerHTML = `
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-bold text-white mb-1.5">Escolha o Item</label>
                            <select required id="c-item-select" class="w-full px-4 py-3 bg-white text-primary font-bold rounded-lg outline-none focus:ring-4 focus:ring-accent/50">
                                ${options}
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-white mb-1.5">Quantidade</label>
                            <input required id="c-item-qty" type="number" min="1" value="1" class="w-full px-4 py-3 bg-white text-primary font-bold rounded-lg outline-none focus:ring-4 focus:ring-accent/50">
                        </div>
                    </div>`;
            }
        }

        function toggleContribForm(show) {
            document.getElementById('contrib-init').classList.toggle('hidden', show);
            document.getElementById('contrib-form').classList.toggle('hidden', !show);
            if(show) document.getElementById('contrib-name').value = '';
        }

        window.updateQuotaTotal = function(val) {
            const qty = document.getElementById('c-quota-qty').value || 1;
            document.getElementById('c-quota-total').innerText = formatCurrency(val * parseInt(qty));
        }

        function submitContribution(e) {
            e.preventDefault();
            const camp = selectedCampaign;
            let payload = { name: document.getElementById('contrib-name').value };
            
            if (camp.type === 'finance') {
                if(camp.mode === 'fixed') {
                    payload.amount = camp.quotaValue * parseInt(document.getElementById('c-quota-qty').value);
                } else {
                    payload.amount = parseFloat(document.getElementById('c-amount').value);
                }
            } else {
                if (camp.mode === 'fixed') {
                    payload.itemName = document.getElementById('c-item-select').value;
                    payload.quantity = parseInt(document.getElementById('c-item-qty').value);
                } else {
                    payload.itemName = document.getElementById('c-item-name').value;
                    payload.quantity = 1; 
                }
            }
            handleAddContribution(camp.id, payload);
            renderDetail(); // Recarrega tela
        }

        // Inicialização
        switchView('list');
    </script>
</body>
</html>
