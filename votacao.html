<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repertório Inspiração - Revit IPCVT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .modal-backdrop {
            position: fixed; inset: 0; background-color: rgba(15, 23, 42, 0.9);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s;
            backdrop-filter: blur(8px);
        }
        .modal-backdrop.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: white; border-radius: 2rem; padding: 2rem; width: 95%; max-width: 450px;
            transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal-backdrop.active .modal-content { transform: scale(1); }
        
        .brand-font { font-family: 'Georgia', serif; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 pb-20">

    <div id="app"></div>

    <script type="module">
        // --- CONFIGURAÇÕES ---
        const apiKey = "AIzaSyAdrQXB8xf3uEcboM2dFNVHi6z9JJdH7uE";

        const THEMES = [
            { title: "Adoração e Louvor", desc: "Músicas focadas na exaltação dos atributos de Deus (Sua santidade, poder e glória), reconhecendo quem Ele é e engrandecendo Seu nome acima de todas as coisas." },
            { title: "Comunhão", desc: "Canções que celebram a unidade do corpo de Cristo, o amor fraternal e a importância de estarmos juntos como igreja, compartilhando a fé e o pão." },
            { title: "Confiança em Deus", desc: "Temas que reforçam o descanso na soberania divina, incentivando a fé em meio às adversidades e a certeza de que Deus está no controle de todas as situações." },
            { title: "Consagração", desc: "Músicas de entrega pessoal e rendição, onde o fiel expressa o desejo de viver uma vida santa, dedicada ao serviço e à vontade de Deus." },
            { title: "Graça e Redenção", desc: "Focam no sacrifício de Jesus na cruz, no perdão dos pecados e no amor imerecido de Deus que nos resgatou e nos deu uma nova vida." },
            { title: "Gratidão", desc: "Expressões de agradecimento pelas bênçãos recebidas, pelo cuidado cotidiano e por tudo o que Deus tem feito na vida do indivíduo e da comunidade." },
            { title: "Missões", desc: "Canções que despertam o ide, focando na responsabilidade de levar o evangelho às nações, no amor pelas almas e no chamado para servir ao próximo." },
            { title: "Palavra e Promessas", desc: "Músicas baseadas nas Escrituras Sagradas, que reafirmam as verdades bíblicas e a fidelidade de Deus em cumprir aquilo que Ele falou." },
            { title: "Transformação e Renovo", desc: "Focam na ação do Espírito Santo em moldar o caráter do cristão, trazendo novo fôlego espiritual, cura interior e uma mudança profunda de mente e coração." }
        ];

        const INITIAL_USERS = [
            { id: 'u1', name: 'Hudson Amorim', phone: '21996959841' },
            { id: 'u2', name: 'Isadora Emerich', phone: '21972734466' },
            { id: 'u3', name: 'Alexandre Vieira', phone: '21985628420' },
            { id: 'u4', name: 'Allyson Gomes', phone: '21983656490' },
            { id: 'u5', name: 'Amanda Gerhardt', phone: '21993064859' },
            { id: 'u6', name: 'Arlete Costa', phone: '21985499917' },
            { id: 'u7', name: 'Daiane Ximenes', phone: '21988594904' },
            { id: 'u8', name: 'Eduardo Machado', phone: '21974892727' },
            { id: 'u9', name: 'Flávio Gregório', phone: '21988339813' },
            { id: 'u10', name: 'Germano Navega', phone: '21993339176' },
            { id: 'u11', name: 'Guilherme Rocha', phone: '21996290401' },
            { id: 'u12', name: 'Jamylle De França', phone: '21983047580' },
            { id: 'u13', name: 'Jean Lucas', phone: '21990519500' },
            { id: 'u14', name: 'Joao Victor Gomes', phone: '21992698519' },
            { id: 'u15', name: 'Laura Emanuele', phone: '21986169455' },
            { id: 'u16', name: 'Liliane Novaes', phone: '21970031216' },
            { id: 'u17', name: 'Lorran Fraga', phone: '21990965848' },
            { id: 'u18', name: 'Mônica de França', phone: '21999798405' },
            { id: 'u19', name: 'Nilson Almeida', phone: '21996594453' },
            { id: 'u20', name: 'Roberta Gregório', phone: '21993364602' },
            { id: 'u21', name: 'Angelo Marcio', phone: '21995213041' },
            { id: 'u22', name: 'Pedro Costa', phone: '21995534541' }
        ];

        // --- ESTADO GLOBAL ---
        const state = {
            users: [...INITIAL_USERS],
            currentUser: null,
            activeTab: 'home',
            isAdminAuthenticated: false,
            currentPeriodId: 'p1', // Adicionado para controle interno
            periods: [{
                id: 'p1',
                name: "1º Bimestre",
                theme: THEMES[4].title,
                themeDefinition: THEMES[4].desc,
                suggestionsOpen: true,
                votingOpen: false
            }],
            songs: [],
            isSubmitting: false,
            loginError: false,
            editingUserId: null,
            modals: {
                reject: { isOpen: false, songId: null, type: null },
                cycle: { isOpen: false, step: 1, error: false },
                viewReason: { isOpen: false, title: '', text: '' }
            }
        };

        // Getter para o período atual simplificado
        Object.defineProperty(state, 'period', {
            get: function() { return this.periods.find(p => p.id === this.currentPeriodId); }
        });

        // --- FUNÇÕES AUXILIARES ---
        
        // CORREÇÃO ERRO 153 (YOUTUBE EMBED)
        window.getYouTubeEmbedUrl = function(url) {
            if (!url) return null;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            if (match && match[2].length === 11) {
                return `https://www.youtube.com/embed/${match[2]}`;
            }
            return null;
        };

        window.getStatusBadgeHtml = function(status) {
            if (status === 'loading' || status === 'pending') {
                return `<span class="inline-flex w-full items-center justify-center px-2 py-1.5 rounded text-[9px] font-bold bg-slate-100 text-slate-500 border border-slate-200 shadow-sm uppercase tracking-wider">Aguardando</span>`;
            }
            if (status === 'Aprovado' || status === 'approved') {
                return `<span class="inline-flex w-full items-center justify-center px-2 py-1.5 rounded text-[9px] font-bold bg-emerald-50 text-emerald-700 border border-emerald-100 shadow-sm uppercase tracking-wider"><i class="ph-bold ph-check-circle mr-1"></i> Aprovado</span>`;
            }
            if (status === 'Erro') {
                return `<span class="inline-flex w-full items-center justify-center px-2 py-1.5 rounded text-[9px] font-bold bg-amber-50 text-amber-700 border border-amber-100 shadow-sm uppercase tracking-wider"><i class="ph-bold ph-warning-circle mr-1"></i> Falha</span>`;
            }
            return `<span class="inline-flex w-full items-center justify-center px-2 py-1.5 rounded text-[9px] font-bold bg-red-50 text-red-700 border border-red-100 shadow-sm uppercase tracking-wider"><i class="ph-bold ph-x-circle mr-1"></i> Reprovado</span>`;
        };

        // --- FUNÇÕES DE NAVEGAÇÃO E RE-RENDER ---
        function render() {
            const app = document.getElementById('app');
            if (!state.currentUser) {
                app.innerHTML = renderLogin();
                return;
            }

            app.innerHTML = `
                <header class="bg-emerald-900 border-b border-emerald-800 py-4 px-4 shadow-md sticky top-0 z-50">
                    <div class="max-w-5xl mx-auto flex items-center justify-between gap-4">
                        <div class="flex items-center cursor-pointer" onclick="window.changeTab('home')">
                            <div class="bg-white p-2 rounded-xl mr-3 text-emerald-900 shadow-sm">
                                <i class="ph-fill ph-church w-5 h-5 flex items-center justify-center"></i>
                            </div>
                            <div>
                                <h1 class="text-xl font-black text-white leading-none brand-font tracking-tight">Revit IPCVT</h1>
                                <p class="text-[9px] text-emerald-200 uppercase font-bold mt-1 tracking-widest">${state.period.name}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="text-right hidden sm:block">
                                <p class="text-[10px] font-black text-emerald-50 leading-none">${state.currentUser.name}</p>
                                <button onclick="window.handleUserLogout()" class="text-[9px] text-emerald-300 font-black uppercase hover:text-white transition">Sair</button>
                            </div>
                            <div class="w-8 h-8 rounded-full bg-emerald-700 border border-emerald-600 flex items-center justify-center font-black text-white text-xs shadow-inner">
                                ${state.currentUser.name.charAt(0).toUpperCase()}
                            </div>
                        </div>
                    </div>
                </header>

                <nav class="bg-white border-b border-slate-200 sticky top-[65px] z-40 shadow-sm overflow-x-auto no-scrollbar">
                    <div class="max-w-5xl mx-auto flex">
                        ${renderTabButton('home', 'Início', 'ph-house')}
                        ${renderTabButton('sugestao', 'Sugestão', 'ph-plus-circle')}
                        ${renderTabButton('votacao', 'Votação', 'ph-archive')}
                        ${renderTabButton('analise', 'Análise', 'ph-shield-check')}
                        ${renderTabButton('cadastro', 'Membros', 'ph-users-three')}
                    </div>
                </nav>

                <main class="max-w-5xl mx-auto mt-6 px-4 pb-12">
                    ${renderActiveTab()}
                </main>

                ${renderModals()}
            `;
        }

        function renderTabButton(id, label, icon) {
            const isActive = state.activeTab === id;
            return `
                <button onclick="window.changeTab('${id}')" class="flex-1 min-w-[90px] flex items-center justify-center py-4 px-4 border-b-2 font-bold text-[10px] uppercase tracking-widest transition-all whitespace-nowrap ${isActive ? 'border-emerald-700 text-emerald-800 bg-emerald-50/50' : 'border-transparent text-slate-500 hover:text-emerald-700'}">
                    <i class="${icon} text-lg mr-2"></i> ${label}
                </button>
            `;
        }

        function renderLogin() {
            const options = state.users.map(u => `<option value="${u.id}">${u.name}</option>`).join('');
            return `
                <div class="min-h-screen bg-emerald-950 flex items-center justify-center p-4 fade-in">
                    <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl border-t-8 border-emerald-700 w-full max-w-md text-center">
                        <div class="bg-emerald-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-8 text-emerald-800 text-4xl shadow-inner">
                            <i class="ph-fill ph-book-open"></i>
                        </div>
                        <h2 class="text-3xl font-black text-slate-800 mb-2 leading-none brand-font">Revit IPCVT</h2>
                        <p class="text-emerald-600 text-[10px] font-black uppercase tracking-[0.3em] mb-10">Repertório de Louvor</p>
                        <form onsubmit="window.handleUserLogin(event)" class="space-y-6 text-left">
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1 tracking-widest">Identifique-se</label>
                                <select id="login-user-select" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-700 font-bold text-slate-700 appearance-none shadow-sm">
                                    ${options}
                                </select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1 tracking-widest">Telefone de Cadastro</label>
                                <input id="login-phone-input" type="tel" placeholder="21 99999-9999" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-700 font-bold text-slate-700 shadow-sm" required />
                                ${state.loginError ? `<p class="text-red-600 text-[10px] mt-3 font-black uppercase text-center tracking-widest">Acesso Negado</p>` : ''}
                            </div>
                            <button type="submit" class="w-full py-5 bg-emerald-800 hover:bg-emerald-900 text-white font-black rounded-[1.5rem] shadow-xl transition transform active:scale-95 uppercase tracking-[0.3em] text-xs mt-4">Entrar no Sistema</button>
                        </form>
                    </div>
                </div>
            `;
        }

        function renderActiveTab() {
            switch(state.activeTab) {
                case 'home': return renderHomeTab();
                case 'sugestao': return renderSugestaoTab();
                case 'votacao': return renderVotacaoTab();
                case 'analise': return renderAnaliseTab();
                case 'cadastro': return renderCadastroTab();
            }
        }

        function renderHomeTab() {
            const approved = state.songs.filter(s => s.joaoApproval === 'approved' && s.techApproval === 'approved');
            const ranking = [...approved].sort((a,b) => b.voters.length - a.voters.length).slice(0, 3);

            if (state.period.suggestionsOpen) {
                return `
                    <div class="text-center py-16 bg-white rounded-[2.5rem] border border-slate-200 shadow-sm fade-in">
                        <div class="w-24 h-24 bg-emerald-50 text-emerald-700 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                            <i class="ph-fill ph-note-pencils text-5xl"></i>
                        </div>
                        <h2 class="text-3xl font-black text-slate-800 mb-2 brand-font">Sugestões Abertas</h2>
                        <p class="text-emerald-600 mb-10 font-black uppercase text-[10px] tracking-[0.4em]">Foco: ${state.period.theme}</p>
                        <button onclick="window.changeTab('sugestao')" class="bg-emerald-800 text-white px-12 py-5 rounded-2xl font-black shadow-xl hover:bg-emerald-900 active:scale-95 transition-all uppercase text-xs tracking-widest">Enviar Indicação</button>
                    </div>
                `;
            }

            if (state.period.votingOpen) {
                return `
                    <div class="text-center py-10 fade-in">
                        <h2 class="text-4xl font-black text-slate-800 mb-10 uppercase tracking-tighter leading-none brand-font">Assembleia<br>de Votos</h2>
                        <div class="max-w-md mx-auto bg-white p-8 rounded-[3rem] border border-emerald-100 shadow-xl mb-10">
                            <h3 class="font-black text-emerald-800/40 text-[10px] mb-8 uppercase tracking-[0.4em]">Pódio Parcial</h3>
                            ${ranking.length > 0 ? `
                                <div class="space-y-4">
                                    ${ranking.map((s, i) => `
                                        <div class="flex justify-between items-center p-5 bg-emerald-50/50 rounded-3xl border border-emerald-100/50 group">
                                            <div class="text-left flex-1 truncate pr-4">
                                                <p class="text-[9px] font-black text-emerald-700 uppercase mb-1 flex items-center gap-2">
                                                    ${i === 0 ? '<i class="ph-fill ph-medal text-amber-500 text-lg"></i> Líder' : i === 1 ? '<i class="ph-fill ph-medal text-slate-400 text-lg"></i> Segundo' : '<i class="ph-fill ph-medal text-amber-700 text-lg"></i> Terceiro'}
                                                </p>
                                                <p class="text-base font-black text-slate-800 leading-tight truncate">${s.title}</p>
                                                <p class="text-[10px] font-bold text-emerald-900/60 uppercase truncate mt-1">${s.author}</p>
                                            </div>
                                            <div class="flex flex-col items-end gap-2 shrink-0">
                                                <span class="text-xs font-black text-emerald-800 bg-white px-4 py-2 rounded-2xl border border-emerald-100 shadow-sm">${s.voters.length} Votos</span>
                                                ${s.link ? `<a href="${s.link}" target="_blank" class="text-red-600 pt-1 group-hover:scale-125 transition-transform"><i class="ph-fill ph-play-circle text-3xl"></i></a>` : ''}
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            ` : `<p class="text-slate-400 font-bold italic py-8 text-sm">Nenhum voto apurado ainda.</p>`}
                        </div>
                        <button onclick="window.changeTab('votacao')" class="bg-emerald-800 text-white px-12 py-5 rounded-2xl font-black shadow-xl hover:bg-emerald-900 active:scale-95 transition uppercase text-xs tracking-widest">Abrir Cédula</button>
                    </div>
                `;
            }

            return `<div class="text-center py-20 text-slate-300 font-black italic uppercase tracking-widest opacity-50 brand-font text-2xl">Ciclo Encerrado</div>`;
        }

        function renderSugestaoTab() {
            if (!state.period.suggestionsOpen) {
                return `<div class="bg-emerald-50 border border-emerald-100 text-emerald-900 p-12 rounded-[3rem] text-center shadow-sm fade-in">
                    <i class="ph-fill ph-lock-key text-7xl mx-auto mb-6 text-emerald-700/30 block"></i>
                    <h3 class="text-2xl font-black mb-1 brand-font">Entradas Fechadas</h3>
                    <p class="text-xs font-black uppercase tracking-widest opacity-50">Consulte a liderança para novas aberturas</p>
                </div>`;
            }

            return `
                <div class="space-y-6 fade-in">
                    <div class="bg-emerald-900 rounded-[2.5rem] p-10 text-white shadow-2xl relative overflow-hidden border-b-8 border-emerald-950">
                        <div class="absolute -bottom-10 -right-10 opacity-10"><i class="ph-fill ph-church text-[250px]"></i></div>
                        <p class="text-emerald-400 text-[10px] font-black uppercase tracking-[0.5em] mb-4 relative z-10 italic">Diretriz do Período</p>
                        <h2 class="text-4xl font-black mb-6 relative z-10 leading-none brand-font tracking-tight">${state.period.theme}</h2>
                        <p class="text-emerald-100/80 text-sm leading-relaxed relative z-10 font-medium max-w-2xl border-l-4 border-emerald-500 pl-6 italic">"${state.period.themeDefinition}"</p>
                    </div>

                    <div class="bg-white p-10 rounded-[3rem] shadow-sm border border-slate-200">
                        <h2 class="text-xl font-black mb-8 text-slate-800 uppercase tracking-widest flex items-center justify-between border-b border-slate-100 pb-6">
                            <span class="flex items-center"><i class="ph-fill ph-plus-circle mr-3 text-emerald-700 text-3xl"></i> Nova Indicação</span>
                            <span class="bg-emerald-50 text-emerald-700 text-[10px] px-4 py-2 rounded-2xl font-black uppercase tracking-widest border border-emerald-100 shadow-sm">${state.currentUser.name}</span>
                        </h2>
                        <form onsubmit="window.submitSong(event)" class="space-y-8">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-3 tracking-widest ml-1 italic">Título do Louvor</label>
                                    <input required id="input-title" name="title" type="text" class="w-full p-5 bg-slate-50 border border-slate-200 rounded-[1.2rem] focus:ring-4 focus:ring-emerald-700/10 focus:border-emerald-700 outline-none transition-all font-bold text-slate-700 text-lg" placeholder="Ex: Grandioso És Tu" />
                                </div>
                                <div>
                                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-3 tracking-widest ml-1 italic">Cantor / Grupo</label>
                                    <input required id="input-author" name="author" type="text" class="w-full p-5 bg-slate-50 border border-slate-200 rounded-[1.2rem] focus:ring-4 focus:ring-emerald-700/10 focus:border-emerald-700 outline-none transition-all font-bold text-slate-700 text-lg" placeholder="Ex: Hinário Novo Cântico" />
                                </div>
                            </div>
                            
                            <div class="flex gap-4">
                                <button type="button" onclick="window.handleSearchYoutube()" class="flex-1 py-4 bg-red-50 text-red-700 hover:bg-red-100 rounded-2xl font-black text-[10px] uppercase tracking-[0.3em] transition flex items-center justify-center border border-red-200 shadow-sm"><i class="ph-fill ph-youtube-logo text-2xl mr-2"></i> YouTube</button>
                                <button type="button" onclick="window.handleSearchLyrics()" class="flex-1 py-4 bg-emerald-50 text-emerald-800 hover:bg-emerald-100 rounded-2xl font-black text-[10px] uppercase tracking-[0.3em] transition flex items-center justify-center border border-emerald-200 shadow-sm"><i class="ph-bold ph-google-logo text-2xl mr-2"></i> Google Letra</button>
                            </div>

                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase mb-3 tracking-widest ml-1 italic">URL de Referência (YouTube)</label>
                                <input name="link" type="url" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-emerald-700 transition font-bold" placeholder="https://youtube.com/..." />
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase mb-3 tracking-widest flex items-center justify-between ml-1 italic">
                                    Letra Completa <span class="bg-emerald-800 text-white px-3 py-1 rounded-full text-[8px] tracking-[0.2em] font-black">ANÁLISE TEOLÓGICA</span>
                                </label>
                                <textarea name="lyrics" id="input-lyrics" class="w-full p-6 bg-slate-50 border border-slate-200 rounded-[1.5rem] outline-none focus:ring-4 focus:ring-emerald-700/10 focus:border-emerald-700 transition text-sm font-medium h-48 resize-none text-slate-700 leading-relaxed shadow-inner" placeholder="Cole a letra para que a IA possa analisar conforme o tema presbiteriano..."></textarea>
                            </div>
                            <button type="submit" ${state.isSubmitting ? 'disabled' : ''} class="w-full py-6 bg-emerald-800 hover:bg-emerald-900 text-white font-black rounded-[2rem] shadow-2xl transition disabled:opacity-50 uppercase tracking-[0.4em] text-xs active:scale-95 border-b-4 border-emerald-950">
                                ${state.isSubmitting ? 'Processando...' : 'Confirmar Indicação'}
                            </button>
                        </form>
                    </div>
                </div>
            `;
        }

        function renderVotacaoTab() {
            const fullyApproved = state.songs.filter(s => s.joaoApproval === 'approved' && s.techApproval === 'approved');
            
            return `
                <div class="space-y-6 fade-in">
                    <div class="text-center mb-10">
                        <h2 class="text-4xl font-black text-slate-800 uppercase tracking-tighter leading-none mb-3 brand-font">Assembleia<br>de Votos</h2>
                        <p class="text-emerald-700 font-black text-[10px] uppercase tracking-[0.4em] bg-emerald-50 w-fit mx-auto px-6 py-2 rounded-full border border-emerald-100 italic">Voto Individual e Intransferível</p>
                    </div>

                    ${!state.period.votingOpen ? `
                        <div class="bg-white p-20 rounded-[4rem] text-center border-2 border-dashed border-slate-200 shadow-sm opacity-50 flex flex-col items-center">
                            <i class="ph-fill ph-lock-key text-8xl text-slate-300 mb-6"></i>
                            <h3 class="font-black text-slate-400 uppercase tracking-widest text-xs">Votação Bloqueada pela Mesa</h3>
                        </div>
                    ` : fullyApproved.length === 0 ? `
                        <div class="bg-white p-20 rounded-[4rem] text-center border border-slate-200 shadow-sm flex flex-col items-center">
                            <i class="ph-fill ph-clipboard-text text-8xl text-emerald-900/10 mb-6"></i>

                                </div>
                                <div class="flex gap-5 pt-8">
                                    <button type="button" onclick="window.closeNewPeriodModal()" class="flex-1 py-5 text-[11px] font-black uppercase tracking-widest text-slate-400">Voltar</button>
                                    <button type="submit" class="flex-[1.5] py-5 bg-emerald-800 text-white rounded-3xl font-black shadow-2xl active:scale-95 text-[11px] uppercase tracking-[0.4em] border-b-4 border-emerald-950">Lançar Ciclo</button>
                                </div>
                            </form>
                        `}
                    </div>
                </div>
            `;
        }

        // --- HANDLERS TAREFAS ---
        window.changeTab = (tab) => { state.activeTab = tab; render(); };
        window.handleUserLogin = (e) => {
            e.preventDefault();
            const uid = document.getElementById('login-user-select').value;
            const phoneInput = document.getElementById('login-phone-input').value;
            const u = state.users.find(u => u.id === uid);
            const cInput = phoneInput.replace(/\D/g, '');
            const cPhone = u.phone.replace(/\D/g, '');
            if (cInput === cPhone) { state.currentUser = u; state.loginError = false; state.activeTab = 'home'; }
            else { state.loginError = true; }
            render();
        };
        window.handleUserLogout = () => { state.currentUser = null; state.isAdminAuthenticated = false; render(); };
        window.handleRegisterUser = (e) => {
            e.preventDefault();
            const n = document.getElementById('reg-name-input').value;
            const p = document.getElementById('reg-phone-input').value;
            if (state.editingUserId) {
                state.users = state.users.map(u => u.id === state.editingUserId ? { ...u, name: n, phone: p } : u);
                state.editingUserId = null;
            } else {
                state.users.push({ id: 'u'+Date.now(), name: n, phone: p });
            }
            render();
        };
        window.handleEditUser = (id) => {
            const u = state.users.find(u => u.id === id);
            state.editingUserId = id;
            render();
            setTimeout(() => {
                document.getElementById('reg-name-input').value = u.name;
                document.getElementById('reg-phone-input').value = u.phone;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, 50);
        };
        window.cancelEditUser = () => { state.editingUserId = null; render(); };
        window.submitSong = (e) => {
            e.preventDefault();
            const f = e.target;
            state.isSubmitting = true; render();
            setTimeout(() => {
                state.songs.push({
                    id: Date.now().toString(),
                    proposerName: state.currentUser.name,
                    proposerId: state.currentUser.id,
                    title: f.title.value,
                    author: f.author.value,
                    link: f.link.value,
                    lyrics: f.lyrics.value,
                    aiAnalysis: null,
                    joaoApproval: 'pending',
                    techApproval: 'pending',
                    voters: []
                });
                state.isSubmitting = false; state.activeTab = 'home'; render();
            }, 600);
        };
        window.handleSearchYoutube = () => {
            const t = document.getElementById('input-title').value;
            const a = document.getElementById('input-author').value;
            if(!t) return alert("Indique o título do louvor.");
            window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(t+' '+a+' louvor')}`, '_blank');
        };
        window.handleSearchLyrics = () => {
            const t = document.getElementById('input-title').value;
            const a = document.getElementById('input-author').value;
            if(!t) return alert("Indique o título do louvor.");
            window.open(`https://www.google.com/search?q=${encodeURIComponent(t+' '+a+' letra')}`, '_blank');
        };

        // NOVO ANALIZE COM PROMPT REFORMADO COMPLETO
        window.analyzeWithAI = async (id) => {
            const song = state.songs.find(s => s.id === id);
            const period = state.period;

            if (!song.lyrics || song.lyrics.trim().length < 10) {
                song.aiAnalysis = { status: "Erro", reason: "Letra ausente ou muito curta para análise teológica." };
                render(); return;
            }

            song.aiAnalysis = 'loading'; render();

            const prompt = `
            # PROTOCOLO DE ANÁLISE LITÚRGICA E DOUTRINÁRIA (TRADIÇÃO REFORMADA)
            Você deve agir como um Presbítero e Teólogo da tradição Presbiteriana e Reformada clássica. Sua análise deve ser rigorosa, baseada nos Padrões de Westminster e na Teologia Reformada.

            ## 1. CRITÉRIO: CONFORMIDADE COM O TEMA
            - O Tema do Ciclo é: "${period.theme}"
            - Definição: "${period.themeDefinition}"
            - Regra: A música deve pregar ou exaltar este tema.

            ## 2. CRITÉRIO: RIGOR TEOLÓGICO REFORMADO (SOLA SCRIPTURA)
            Analise buscando:
            - **Teocentrismo:** Deus é o centro ou a música foca excessivamente no "eu"?
            - **Doutrina da Graça:** A salvação e a soberania de Deus estão corretas? Rejeite teologia da prosperidade ou misticismo.
            - **Dignidade e Reverência:** A linguagem é adequada para o culto ao Deus Santo? 
            - **Substância Bíblica:** A letra tem profundidade ou é apenas emocionalismo?

            ---
            Música: ${song.title} - ${song.author}
            Letra: "${song.lyrics}"

            ---
            Retorne EXCLUSIVAMENTE um objeto JSON no formato:
            {"status": "Aprovado" ou "Reprovado", "reason": "Sua análise em no máximo 3 frases curtas e diretas."}
            `;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                let txt = data.candidates[0].content.parts[0].text.replace(/```json\n?/i, '').replace(/\n?```$/i, '').trim();
                song.aiAnalysis = JSON.parse(txt);
            } catch (e) { 
                song.aiAnalysis = { status: "Erro", reason: "Falha na comunicação com a API. Verifique a chave ou tente novamente." }; 
            }
            render();
        };

        window.resetAIAnalysis = (id) => { state.songs.find(s => s.id === id).aiAnalysis = null; render(); };
        window.handleVote = (id) => {
            const hasVoted = state.songs.some(s => s.voters.includes(state.currentUser.id));
            state.songs.forEach(s => {
                s.voters = s.voters.filter(uid => uid !== state.currentUser.id);
                if (!hasVoted && s.id === id) s.voters.push(state.currentUser.id);
                else if (hasVoted && s.id === id) s.voters.push(state.currentUser.id);
            });
            render();
        };
        window.loginAdmin = (e) => {
            e.preventDefault();
            if (document.getElementById('admin-password').value === '123') { state.isAdminAuthenticated = true; }
            else { document.getElementById('auth-error').classList.remove('hidden'); }
            render();
        };
        window.setApproval = (id, type, status) => {
            const s = state.songs.find(s => s.id === id);
            if (status === 'rejected') { state.modals.reject = { isOpen: true, songId: id, type }; }
            else if (status === 'approved') {
                if (type === 'joao') s.joaoApproval = 'approved';
                if (type === 'tech') s.techApproval = 'approved';
            } else {
                if (type === 'joao') s.joaoApproval = 'pending';
                if (type === 'tech') s.techApproval = 'pending';
            }
            render();
        };
        window.confirmRejection = () => {
            const r = document.getElementById('reject-reason-input').value;
            if(!r) return alert("Justificativa obrigatória.");
            const s = state.songs.find(s => s.id === state.modals.reject.songId);
            if (state.modals.reject.type === 'joao') { s.joaoApproval = 'rejected'; s.joaoReason = r; }
            else { s.techApproval = 'rejected'; s.techReason = r; }
            window.closeRejectModal();
        };
        window.closeRejectModal = () => { state.modals.reject.isOpen = false; render(); };
        window.openViewReasonModal = (title, text) => { state.modals.viewReason = { isOpen: true, title, text }; render(); };
        window.closeViewReasonModal = () => { state.modals.viewReason.isOpen = false; render(); };
        window.toggleSetting = (s) => { state.period[s] = !state.period[s]; render(); };
        window.openNewPeriodModal = () => { state.modals.cycle = { isOpen: true, step: 1, error: false }; render(); };
        window.closeNewPeriodModal = () => { state.modals.cycle.isOpen = false; render(); };
        window.handleCycleModalNext = () => {
            if (document.getElementById('cycle-password-input').value === '123') { state.modals.cycle.step = 2; state.modals.cycle.error = false; }
            else { state.modals.cycle.error = true; }
            render();
        };
        window.confirmNewCycle = (e) => {
            e.preventDefault();
            const nameInput = document.getElementById('cycle-new-name');
            const themeIdxSelect = document.getElementById('cycle-new-theme');
            const newTheme = THEMES[themeIdxSelect.value];
            
            const newPeriod = { 
                id: 'p'+Date.now(),
                name: nameInput.value, 
                theme: newTheme.title,
                themeDefinition: newTheme.desc,
                suggestionsOpen: true, 
                votingOpen: false 
            };
            
            state.periods.push(newPeriod);
            state.currentPeriodId = newPeriod.id;
            state.songs = []; 
            state.modals.cycle.isOpen = false; 
            render();
        };

        // Início
        render();
    </script>
</body>
</html>
